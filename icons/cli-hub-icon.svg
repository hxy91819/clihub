<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="CLI Hub icon">
  <defs>
    <linearGradient id="bg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1a2d"/>
      <stop offset="1" stop-color="#08111f"/>
    </linearGradient>
    <linearGradient id="cyan" x1="236" y1="314" x2="734" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#56d8ff"/>
      <stop offset="1" stop-color="#22c7e8"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.10 0 0 0 0 0.74 0 0 0 0 0.95 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="176" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="83" y="83" width="858" height="858" rx="157" fill="none" stroke="#244466" stroke-width="4" opacity="0.55"/>

  <g filter="url(#softGlow)">
    <path d="M286 358 L468 512 L286 666" fill="none" stroke="url(#cyan)" stroke-width="74" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="540" y="609" width="220" height="66" rx="16" fill="url(#cyan)"/>
  </g>

  <g fill="#50d8ff">
    <path d="M774 192 L788 245 L841 259 L788 273 L774 326 L760 273 L707 259 L760 245 Z"/>
    <circle cx="846" cy="188" r="13"/>
  </g>
</svg>
