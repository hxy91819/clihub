name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package public VSIX
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          bash ./release.sh "$VERSION" --force --channel public

      - name: Create GitHub Release and upload VSIX
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" cli-hub-*-public.vsix --clobber
          else
            gh release create "$TAG_NAME" cli-hub-*-public.vsix --generate-notes --latest
          fi

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        shell: bash
        run: |
          VSIX_FILE="$(ls cli-hub-*-public.vsix | head -n 1)"
          npx --yes @vscode/vsce publish --packagePath "$VSIX_FILE" --skip-duplicate

      - name: Skip VS Code Marketplace publish
        if: ${{ env.VSCE_PAT == '' }}
        run: |
          echo "VSCE_PAT is not configured; skipping VS Code Marketplace publish."
