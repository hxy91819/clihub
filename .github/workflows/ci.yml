name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package public VSIX
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          bash ./release.sh "$VERSION" --force --channel public

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-public-vsix
          path: |
            cli-hub-[0-9]*-public.vsix
            cli-hub-local-bridge-*-public.vsix
